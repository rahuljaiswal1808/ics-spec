name: ICS CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Validate, lint, and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install ".[live]" pytest

      - name: Run validator test suite
        run: python ics_validator.py --test

      - name: Run token analyzer test suite
        run: python ics_token_analyzer.py --test

      - name: Run pytest test suite
        run: python -m pytest test_ics_*.py -v

      - name: Validate all example .ics files
        run: |
          set -e
          for f in examples/*.ics; do
            echo "Validating $f ..."
            ics-validate "$f"
          done
          echo "All example files passed validation."

      - name: Lint all example .ics files
        run: |
          set -e
          for f in examples/*.ics; do
            echo "Linting $f ..."
            ics-lint "$f"
          done
          echo "All example files passed linting."

      - name: Run demo (dry-run, no API key required)
        run: python ics_demo.py
