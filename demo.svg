<text x="310" y="336" fill="#8b949e" font-weight="bold" text-anchor="end">ICS</text>
<text x="406" y="336" fill="#8b949e" font-weight="bold" text-anchor="end">Savings</text>

<!-- Dash separator -->
<text x="30" y="354" fill="#3d4450">&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500; &#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500; &#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500; &#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;</text>

<!-- N=1 row -->
<text x="30" y="372" fill="#c9d1d9">N=1</text>
<text x="200" y="372" fill="#c9d1d9" text-anchor="end">$0.01383</text>
<text x="310" y="372" fill="#c9d1d9" text-anchor="end">$0.01693</text>
<text x="406" y="372" fill="#f85149" text-anchor="end">-22.4%</text>

<!-- N=5 row -->
<text x="30" y="390" fill="#c9d1d9">N=5</text>
<text x="200" y="390" fill="#c9d1d9" text-anchor="end">$0.06915</text>
<text x="310" y="390" fill="#c9d1d9" text-anchor="end">$0.02761</text>
<text x="406" y="390" fill="#56d364" text-anchor="end">+60.1%</text>

<!-- N=10 row -->
<text x="30" y="408" fill="#c9d1d9">N=10</text>
<text x="200" y="408" fill="#c9d1d9" text-anchor="end">$0.13830</text>
<text x="310" y="408" fill="#c9d1d9" text-anchor="end">$0.04097</text>
<text x="406" y="408" fill="#56d364" text-anchor="end">+70.4%</text>

<!-- Break-even note -->
<text x="30" y="432" fill="#c9d1d9">Break-even: ICS becomes cheaper from <tspan fill="#56d364">call 2</tspan> onwards.</text>

<!-- Heavy divider -->
<text x="16" y="456" fill="#388bfd">&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;</text>

<!-- Summary line 1 -->
<text x="30" y="474" fill="#c9d1d9" font-weight="bold">Summary: ICS saves ~<tspan fill="#79c0ff">4,133</tspan> tokens per call. Break-even: <tspan fill="#56d364">call 2</tspan>.</text>

<!-- Summary line 2 -->
<text x="30" y="492" fill="#c9d1d9">         At N=10: <tspan fill="#56d364" font-weight="bold">70.4% cheaper</tspan> ($0.09733 saved per 10-call session).</text>

