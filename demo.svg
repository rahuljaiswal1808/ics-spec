<!-- Naive explanation -->
<text x="30" y="222" fill="#c9d1d9">Naive:  <tspan fill="#79c0ff">4,611</tspan> tokens at full rate &#x2014; every single call</text>

<!-- ICS call 1 -->
<text x="30" y="240" fill="#c9d1d9">ICS:    call 1  &#x2192;  <tspan fill="#79c0ff">4,133</tspan> cache-write  +  <tspan fill="#79c0ff">477</tspan> normal</text>

<!-- ICS call 2+ -->
<text x="30" y="258" fill="#c9d1d9">        call 2+ &#x2192;  <tspan fill="#79c0ff">4,133</tspan> cache-read   +  <tspan fill="#79c0ff">477</tspan> normal</text>

<!-- Cache-read note -->
<text x="30" y="276" fill="#6e7681">        (cache-read = 10% of full input rate)</text>

<!-- PROJECTED COST section header -->
<text x="16" y="300" fill="#f0f6fc" font-weight="bold">PROJECTED COST<tspan fill="#8b949e" font-weight="normal">  (claude-sonnet-4-6  &#xB7;  $3.00/M input)</tspan></text>

<!-- Light divider -->
<text x="16" y="318" fill="#3d4450">&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;</text>

